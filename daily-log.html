<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Easy Reader • Daily Log</title>
  <link rel="manifest" href="app-manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: #e5e5e5; }
    .card { background: #1a1a1a; }
    input, select, textarea { background: #111; border: 1px solid #333; }
    input:focus, select:focus, textarea:focus { border-color: #f97316; outline: none; }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #f97316; color: black; padding: 12px 24px; border-radius: 9999px;
      font-weight: 600; display: none; z-index: 9999;
    }
  </style>
</head>
<body class="max-w-md mx-auto p-4">

  <!-- Header -->
  <div class="mb-4">
    <div class="flex items-center gap-3 mb-1">
      <div class="w-9 h-9 bg-orange-500 rounded flex items-center justify-center">
        <i class="fa-solid fa-book text-white text-xl"></i>
      </div>
      <div class="font-bold text-xl">Stasis Reader ©</div>
    </div>

    <!-- Main Headline -->
    <div class="text-center">
      <h1 class="text-3xl font-bold tracking-tight">The Easy Reader</h1>
      <p class="text-sm text-gray-400 mt-0.5">Daily Log</p>
    </div>

    <!-- Install App Button -->
    <div class="text-center mt-3">
      <button id="installBtn" 
              class="hidden bg-orange-500 hover:bg-orange-600 text-black font-semibold px-5 py-2 rounded-2xl text-sm flex items-center gap-2 mx-auto">
        <i class="fa-solid fa-download"></i>
        <span>Install App</span>
      </button>
    </div>
  </div>

  <!-- Back button -->
  <div class="mb-5">
    <button onclick="window.location.href='index.html'" class="flex items-center gap-x-2 text-sm text-zinc-400 hover:text-white">
      <i class="fa-solid fa-arrow-left"></i>
      <span>Back to Overview</span>
    </button>
  </div>

  <!-- Daily Log Form -->
  <div class="card rounded-2xl p-5 mb-6">
    <div class="font-semibold mb-4 flex items-center gap-2 text-lg">
      <i class="fa-solid fa-leaf text-orange-400"></i> 
      <span>Daily Log</span>
    </div>

    <!-- Type -->
    <div class="mb-4">
      <label class="text-sm text-gray-400 block mb-1">Type</label>
      <select id="type" class="w-full p-3 rounded-xl text-lg">
        <option value="Sun-dried Turmeric Cubes (2018 Merced)">🌿 Sun-dried Turmeric Cubes (2018 Merced)</option>
        <option value="Turmeric Powder">Turmeric Powder</option>
        <option value="Fresh Ginger">Fresh Ginger</option>
        <option value="Both">Both (Ginger + Turmeric)</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <!-- Dose + Unit -->
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div>
        <label class="text-sm text-gray-400 block mb-1">Dose</label>
        <input id="dose" type="number" step="0.1" placeholder="2.5" class="w-full p-3 rounded-xl text-lg">
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Unit</label>
        <select id="unit" class="w-full p-3 rounded-xl text-lg">
          <option value="g">grams</option>
          <option value="cubes">cubes</option>
          <option value="tsp">tsp</option>
        </select>
      </div>
    </div>

    <!-- Blood Pressure -->
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div>
        <label class="text-sm text-gray-400 block mb-1">Systolic</label>
        <input id="systolic" type="number" placeholder="120" class="w-full p-3 rounded-xl text-lg">
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Diastolic</label>
        <input id="diastolic" type="number" placeholder="80" class="w-full p-3 rounded-xl text-lg">
      </div>
    </div>

    <!-- Heart Rate -->
    <div class="mb-4">
      <label class="text-sm text-gray-400 block mb-1">Heart Rate (bpm)</label>
      <input id="hr" type="number" placeholder="72" class="w-full p-3 rounded-xl text-lg">
    </div>

    <!-- Notes -->
    <div class="mb-5">
      <label class="text-sm text-gray-400 block mb-1">Notes</label>
      <textarea id="notes" rows="2" placeholder="How are you feeling?" class="w-full p-3 rounded-xl resize-y"></textarea>
    </div>

    <button onclick="saveLog()" class="w-full bg-orange-500 hover:bg-orange-600 text-black font-bold py-4 rounded-2xl text-lg flex items-center justify-center gap-2">
      <i class="fa-solid fa-save"></i>
      <span>SAVE LOG</span>
    </button>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-3 gap-3 mb-6">
    <div class="card rounded-2xl p-4 text-center">
      <div class="text-xs text-gray-400">STREAK</div>
      <div id="streak" class="text-3xl font-bold text-orange-400">0</div>
      <div class="text-xs">days</div>
    </div>
    <div class="card rounded-2xl p-4 text-center">
      <div class="text-xs text-gray-400">TOTAL LOGS</div>
      <div id="total-logs" class="text-3xl font-bold">0</div>
    </div>
    <div class="card rounded-2xl p-4 text-center">
      <div class="text-xs text-gray-400">AVG BP</div>
      <div id="avg-bp" class="text-3xl font-bold">--</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="card rounded-2xl p-5 mb-6">
    <div class="font-semibold mb-4">Blood Pressure Trend</div>
    <canvas id="bpChart" height="120"></canvas>
  </div>

  <!-- History + Download -->
  <div>
    <div class="flex justify-between items-center mb-3 px-1">
      <div class="font-semibold">Recent Logs</div>
      <div class="flex gap-2">
        <button onclick="downloadData()" class="text-xs bg-zinc-700 hover:bg-zinc-600 px-3 py-1 rounded-full flex items-center gap-1">
          <i class="fa-solid fa-download text-xs"></i>
          <span>Download</span>
        </button>
        <button onclick="clearAllLogs()" class="text-xs text-red-400">Clear all</button>
      </div>
    </div>
    <div id="history" class="space-y-3"></div>
  </div>

  <div id="toast" class="toast">Log saved successfully!</div>

  <script>
    let chartInstance = null;

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    function calculateStreak(logs) {
      if (logs.length === 0) return 0;
      
      const dates = logs.map(log => new Date(log.date).toDateString());
      const uniqueDates = [...new Set(dates)].sort((a, b) => new Date(b) - new Date(a));
      
      let streak = 1;
      for (let i = 1; i < uniqueDates.length; i++) {
        const current = new Date(uniqueDates[i]);
        const previous = new Date(uniqueDates[i - 1]);
        const diffDays = Math.floor((previous - current) / (1000 * 60 * 60 * 24));
        if (diffDays === 1) {
          streak++;
        } else {
          break;
        }
      }
      return streak;
    }

    function updateStats(logs) {
      document.getElementById('total-logs').textContent = logs.length;
      
      // Streak
      const streak = calculateStreak(logs);
      document.getElementById('streak').textContent = streak;
      
      // Average BP
      if (logs.length > 0) {
        const validLogs = logs.filter(l => l.systolic && l.diastolic);
        if (validLogs.length > 0) {
          const avgSys = Math.round(validLogs.reduce((sum, l) => sum + parseInt(l.systolic), 0) / validLogs.length);
          const avgDia = Math.round(validLogs.reduce((sum, l) => sum + parseInt(l.diastolic), 0) / validLogs.length);
          document.getElementById('avg-bp').textContent = `${avgSys}/${avgDia}`;
        } else {
          document.getElementById('avg-bp').textContent = '--';
        }
      } else {
        document.getElementById('avg-bp').textContent = '--';
      }
    }

    function updateChart(logs) {
      const ctx = document.getElementById('bpChart');
      
      if (chartInstance) {
        chartInstance.destroy();
      }

      const sortedLogs = [...logs].sort((a, b) => new Date(a.date) - new Date(b.date));
      const labels = sortedLogs.map(log => new Date(log.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
      const systolic = sortedLogs.map(log => log.systolic ? parseInt(log.systolic) : null);
      const diastolic = sortedLogs.map(log => log.diastolic ? parseInt(log.diastolic) : null);

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Systolic',
              data: systolic,
              borderColor: '#f97316',
              backgroundColor: 'rgba(249, 115, 22, 0.1)',
              tension: 0.3,
              fill: false
            },
            {
              label: 'Diastolic',
              data: diastolic,
              borderColor: '#fb923c',
              backgroundColor: 'rgba(251, 146, 60, 0.1)',
              tension: 0.3,
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: true, position: 'top' } },
          scales: {
            y: { beginAtZero: false, grid: { color: '#333' } },
            x: { grid: { color: '#333' } }
          }
        }
      });
    }

    function saveLog() {
      const type = document.getElementById('type').value;
      const dose = document.getElementById('dose').value;
      const unit = document.getElementById('unit').value;
      const systolic = document.getElementById('systolic').value;
      const diastolic = document.getElementById('diastolic').value;
      const hr = document.getElementById('hr').value;
      const notes = document.getElementById('notes').value;

      if (!dose) {
        alert("Please enter a dose");
        return;
      }

      const log = {
        date: new Date().toISOString(),
        type,
        dose: parseFloat(dose),
        unit,
        systolic: systolic ? parseInt(systolic) : null,
        diastolic: diastolic ? parseInt(diastolic) : null,
        hr: hr ? parseInt(hr) : null,
        notes
      };

      let logs = JSON.parse(localStorage.getItem('usginger_logs') || '[]');
      logs.unshift(log); // newest first
      localStorage.setItem('usginger_logs', JSON.stringify(logs));

      showToast("Log saved successfully!");
      
      // Clear form
      document.getElementById('dose').value = '';
      document.getElementById('systolic').value = '';
      document.getElementById('diastolic').value = '';
      document.getElementById('hr').value = '';
      document.getElementById('notes').value = '';

      loadAll();
    }

    function downloadData() {
      const logs = JSON.parse(localStorage.getItem('usginger_logs') || '[]');
      if (logs.length === 0) {
        alert("No logs to download");
        return;
      }
      const dataStr = JSON.stringify(logs, null, 2);
      const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
      
      const exportFileDefaultName = `usginger_daily_logs_${new Date().toISOString().slice(0,10)}.json`;
      
      const linkElement = document.createElement('a');
      linkElement.setAttribute('href', dataUri);
      linkElement.setAttribute('download', exportFileDefaultName);
      linkElement.click();
    }

    function clearAllLogs() {
      if (confirm('Delete all logs? This cannot be undone.')) {
        localStorage.removeItem('usginger_logs');
        loadAll();
        showToast("All logs cleared");
      }
    }

    function renderHistory(logs) {
      const container = document.getElementById('history');
      container.innerHTML = '';

      if (logs.length === 0) {
        container.innerHTML = '<p class="text-sm text-gray-500 px-1">No logs yet. Start tracking!</p>';
        return;
      }

      logs.slice(0, 10).forEach((log, index) => {
        const date = new Date(log.date).toLocaleDateString('en-US', { 
          month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' 
        });
        
        const div = document.createElement('div');
        div.className = 'card rounded-2xl p-4 text-sm';
        div.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <div class="font-medium">${log.type}</div>
              <div class="text-xs text-gray-400">${date}</div>
            </div>
            <div class="text-right">
              <div>${log.dose} ${log.unit}</div>
              ${log.systolic ? `<div class="text-xs">${log.systolic}/${log.diastolic} mmHg</div>` : ''}
            </div>
          </div>
          ${log.notes ? `<div class="text-xs text-gray-400 mt-2">${log.notes}</div>` : ''}
        `;
        container.appendChild(div);
      });
    }

    function loadAll() {
      const logs = JSON.parse(localStorage.getItem('usginger_logs') || '[]');
      updateStats(logs);
      updateChart(logs);
      renderHistory(logs);
    }

    function init() {
      loadAll();
    }

    window.onload = init;

    // PWA Install Button
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt = null;
      installBtn.classList.add('hidden');
    });

    window.addEventListener('appinstalled', () => {
      installBtn.classList.add('hidden');
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>

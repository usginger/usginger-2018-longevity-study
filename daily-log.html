<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stasis Reader • Daily Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: #e5e5e5; }
    .card { background: #1a1a1a; }
    input, select, textarea { background: #111; border: 1px solid #333; }
    input:focus, select:focus, textarea:focus { border-color: #f97316; outline: none; }
  </style>
</head>
<body class="max-w-md mx-auto p-4">

  <!-- Header -->
  <div class="flex items-center justify-between mb-2">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-orange-500 rounded flex items-center justify-center">
        <i class="fa-solid fa-book text-white text-xl"></i>
      </div>
      <div>
        <div class="font-bold text-xl">Stasis Reader</div>
        <div class="text-xs text-gray-400">USGinger • Daily Log</div>
      </div>
    </div>
  </div>

  <!-- Back button -->
  <div class="mb-5">
    <button onclick="window.location.href='index.html'" 
            class="flex items-center gap-x-2 text-sm text-zinc-400 hover:text-white">
      <i class="fa-solid fa-arrow-left"></i>
      <span>Back to Stasis Reader</span>
    </button>
  </div>

  <!-- Intake Form -->
  <div class="card rounded-2xl p-5 mb-6">
    <div class="font-semibold mb-4 flex items-center gap-2 text-lg">
      <i class="fa-solid fa-leaf text-orange-400"></i> 
      <span>Daily Log</span>
    </div>

    <!-- Type -->
    <div class="mb-4">
      <label class="text-sm text-gray-400 block mb-1">Type</label>
      <select id="type" class="w-full p-3 rounded-xl text-lg">
        <option value="Sun-dried Turmeric Cubes (2018 Merced)">🌿 Sun-dried Turmeric Cubes (2018 Merced)</option>
        <option value="Turmeric Powder">Turmeric Powder</option>
        <option value="Fresh Ginger">Fresh Ginger</option>
        <option value="Both">Both (Ginger + Turmeric)</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <!-- Dose -->
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div>
        <label class="text-sm text-gray-400 block mb-1">Dose</label>
        <input id="dose" type="number" step="0.1" placeholder="2.5" class="w-full p-3 rounded-xl text-lg">
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Unit</label>
        <select id="unit" class="w-full p-3 rounded-xl text-lg">
          <option value="g">grams</option>
          <option value="cubes">cubes</option>
          <option value="tsp">tsp</option>
        </select>
      </div>
    </div>

    <!-- BP -->
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div>
        <label class="text-sm text-gray-400 block mb-1">Systolic</label>
        <input id="systolic" type="number" placeholder="120" class="w-full p-3 rounded-xl text-lg">
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Diastolic</label>
        <input id="diastolic" type="number" placeholder="80" class="w-full p-3 rounded-xl text-lg">
      </div>
    </div>

    <!-- HR -->
    <div class="mb-4">
      <label class="text-sm text-gray-400 block mb-1">Heart Rate (bpm)</label>
      <input id="hr" type="number" placeholder="72" class="w-full p-3 rounded-xl text-lg">
    </div>

    <!-- Notes -->
    <div class="mb-5">
      <label class="text-sm text-gray-400 block mb-1">Notes</label>
      <textarea id="notes" rows="2" placeholder="How are you feeling?" class="w-full p-3 rounded-xl resize-y"></textarea>
    </div>

    <button onclick="saveLog()" 
            class="w-full bg-orange-500 hover:bg-orange-600 text-black font-bold py-4 rounded-2xl text-lg flex items-center justify-center gap-2 active:scale-[0.985]">
      <i class="fa-solid fa-save"></i>
      <span>SAVE LOG</span>
    </button>
  </div>

  <!-- Stats + Streak -->
  <div class="grid grid-cols-3 gap-3 mb-6">
    <div class="card rounded-2xl p-4 text-center">
      <div class="text-xs text-gray-400">STREAK</div>
      <div id="streak" class="text-3xl font-bold text-orange-400">0</div>
      <div class="text-xs">days</div>
    </div>
    <div class="card rounded-2xl p-4 text-center">
      <div class="text-xs text-gray-400">TOTAL LOGS</div>
      <div id="total-logs" class="text-3xl font-bold">0</div>
    </div>
    <div class="card rounded-2xl p-4 text-center">
      <div class="text-xs text-gray-400">AVG BP</div>
      <div id="avg-bp" class="text-3xl font-bold">--</div>
    </div>
  </div>

  <!-- BP Chart -->
  <div class="card rounded-2xl p-5 mb-6">
    <div class="font-semibold mb-4">Blood Pressure Trend</div>
    <canvas id="bpChart" height="120"></canvas>
  </div>

  <!-- History -->
  <div>
    <div class="flex justify-between items-center mb-3 px-1">
      <div class="font-semibold">Recent Logs</div>
      <button onclick="clearAllLogs()" class="text-xs text-red-400">Clear all</button>
    </div>
    <div id="history" class="space-y-3"></div>
  </div>

  <script>
    let chartInstance = null;

    function updateStats(logs) {
      // Streak
      let streak = 0;
      if (logs.length > 0) {
        const today = new Date().toDateString();
        let currentDate = new Date();
        for (let i = 0; i < logs.length; i++) {
          const logDate = new Date(logs[i].timestamp).toDateString();
          if (logDate === currentDate.toDateString()) {
            streak++;
            currentDate.setDate(currentDate.getDate() - 1);
          } else {
            break;
          }
        }
      }
      document.getElementById('streak').textContent = streak;

      // Total logs
      document.getElementById('total-logs').textContent = logs.length;

      // Average BP
      const bpLogs = logs.filter(l => l.systolic && l.diastolic);
      if (bpLogs.length > 0) {
        const avgSys = Math.round(bpLogs.reduce((sum, l) => sum + parseInt(l.systolic), 0) / bpLogs.length);
        document.getElementById('avg-bp').textContent = avgSys;
      } else {
        document.getElementById('avg-bp').textContent = '--';
      }
    }

    function updateChart(logs) {
      const ctx = document.getElementById('bpChart');
      if (chartInstance) chartInstance.destroy();

      const sortedLogs = [...logs].reverse(); // oldest first for chart
      const labels = sortedLogs.map(l => new Date(l.timestamp).toLocaleDateString('en-US', {month:'short', day:'numeric'}));
      const systolicData = sortedLogs.map(l => l.systolic || null);
      const diastolicData = sortedLogs.map(l => l.diastolic || null);

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Systolic',
              data: systolicData,
              borderColor: '#f97316',
              tension: 0.3
            },
            {
              label: 'Diastolic',
              data: diastolicData,
              borderColor: '#3b82f6',
              tension: 0.3
            }
          ]
        },
        options: {
          responsive: true,
          scales: { y: { beginAtZero: false } }
        }
      });
    }

    function saveLog() {
      const log = {
        id: Date.now(),
        timestamp: new Date().toISOString(),
        type: document.getElementById('type').value,
        dose: document.getElementById('dose').value || '—',
        unit: document.getElementById('unit').value,
        systolic: document.getElementById('systolic').value || null,
        diastolic: document.getElementById('diastolic').value || null,
        hr: document.getElementById('hr').value || null,
        notes: document.getElementById('notes').value.trim()
      };

      let logs = JSON.parse(localStorage.getItem('usginger_logs') || '[]');
      logs.unshift(log);
      localStorage.setItem('usginger_logs', JSON.stringify(logs));

      // Reset form
      document.getElementById('dose').value = '';
      document.getElementById('systolic').value = '';
      document.getElementById('diastolic').value = '';
      document.getElementById('hr').value = '';
      document.getElementById('notes').value = '';

      loadAll();
    }

    function loadAll() {
      const logs = JSON.parse(localStorage.getItem('usginger_logs') || '[]');
      updateStats(logs);
      updateChart(logs);
      renderHistory(logs);
    }

    function renderHistory(logs) {
      const container = document.getElementById('history');
      container.innerHTML = '';

      if (logs.length === 0) {
        container.innerHTML = `<div class="text-center text-gray-500 py-4">No logs yet</div>`;
        return;
      }

      logs.slice(0, 8).forEach(log => {
        const dateStr = new Date(log.timestamp).toLocaleDateString('en-US', {month:'short', day:'numeric'});
        const div = document.createElement('div');
        div.className = 'card rounded-2xl p-4 text-sm';
        div.innerHTML = `
          <div class="flex justify-between">
            <div>
              <span class="font-medium">${dateStr}</span>
              <span class="text-orange-400 ml-2">${log.type}</span>
            </div>
            <button onclick="deleteLog(${log.id}, this)" class="text-red-400 text-xs">Delete</button>
          </div>
          <div class="mt-1 text-xs text-gray-400">
            ${log.dose} ${log.unit} • BP: ${log.systolic || '--'}/${log.diastolic || '--'} • HR: ${log.hr || '--'}
          </div>
        `;
        container.appendChild(div);
      });
    }

    function deleteLog(id, element) {
      if (!confirm('Delete this log?')) return;
      let logs = JSON.parse(localStorage.getItem('usginger_logs') || '[]');
      logs = logs.filter(l => l.id !== id);
      localStorage.setItem('usginger_logs', JSON.stringify(logs));
      loadAll();
    }

    function clearAllLogs() {
      if (!confirm('Delete ALL logs?')) return;
      localStorage.removeItem('usginger_logs');
      loadAll();
    }

    function init() {
      loadAll();
    }

    window.onload = init;
  </script>
</body>
</html>

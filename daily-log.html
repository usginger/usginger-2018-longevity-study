<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stasis Reader • Daily Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: #e5e5e5; }
    .card { background: #1a1a1a; }
    .accent { color: #f97316; }
    .btn-primary { background: #f97316; color: white; }
    .btn-primary:hover { background: #ea580c; }
    input, select, textarea { background: #111; border: 1px solid #333; }
    input:focus, select:focus, textarea:focus { border-color: #f97316; outline: none; }
  </style>
</head>
<body class="max-w-md mx-auto p-4">
  <!-- Header matching your screenshot -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-orange-500 rounded flex items-center justify-center">
        <i class="fa-solid fa-book text-white text-xl"></i>
      </div>
      <div>
        <div class="font-bold text-xl">Stasis Reader</div>
        <div class="text-xs text-gray-400">USGinger • Daily Log</div>
      </div>
    </div>
    <div class="text-right text-xs text-gray-400">
      <div id="current-date"></div>
    </div>
  </div>

  <!-- Intake -->
  <div class="card rounded-2xl p-5 mb-4">
    <div class="font-semibold mb-3 flex items-center gap-2">
      <i class="fa-solid fa-leaf accent"></i> 
      <span>Intake</span>
    </div>
    
    <div class="mb-4">
      <label class="text-sm text-gray-400">Type</label>
      <select id="type" class="w-full p-3 rounded-xl text-lg">
        <option value="Sun-dried Turmeric Cubes (2018 Merced)">🌿 Sun-dried Turmeric Cubes (2018 Merced)</option>
        <option value="Turmeric Powder">Turmeric Powder</option>
        <option value="Fresh Ginger">Fresh Ginger</option>
        <option value="Supplement">Supplement</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="text-sm text-gray-400">Dose</label>
        <input id="dose" type="number" step="0.1" placeholder="2.5" class="w-full p-3 rounded-xl text-lg">
      </div>
      <div>
        <label class="text-sm text-gray-400">Unit</label>
        <select id="unit" class="w-full p-3 rounded-xl text-lg">
          <option value="g">grams (g)</option>
          <option value="cubes">cubes</option>
          <option value="tsp">tsp</option>
          <option value="mg">mg</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Vitals -->
  <div class="card rounded-2xl p-5 mb-4">
    <div class="font-semibold mb-3 flex items-center gap-2">
      <i class="fa-solid fa-heart-pulse accent"></i> 
      <span>Vitals</span>
    </div>
    
    <div class="grid grid-cols-2 gap-3 mb-3">
      <div>
        <label class="text-sm text-gray-400">Systolic</label>
        <input id="systolic" type="number" placeholder="120" class="w-full p-3 rounded-xl text-lg">
      </div>
      <div>
        <label class="text-sm text-gray-400">Diastolic</label>
        <input id="diastolic" type="number" placeholder="80" class="w-full p-3 rounded-xl text-lg">
      </div>
    </div>
    
    <div>
      <label class="text-sm text-gray-400">Heart Rate (bpm)</label>
      <input id="hr" type="number" placeholder="72" class="w-full p-3 rounded-xl text-lg">
    </div>
  </div>

  <!-- Notes -->
  <div class="card rounded-2xl p-5 mb-6">
    <div class="font-semibold mb-3">Notes</div>
    <textarea id="notes" rows="3" placeholder="Felt great today, good energy after cubes..." 
              class="w-full p-3 rounded-xl resize-y"></textarea>
  </div>

  <!-- Save Button -->
  <button onclick="saveLog()" 
          class="btn-primary w-full py-4 rounded-2xl text-xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-[0.985]">
    <i class="fa-solid fa-save"></i>
    <span>SAVE LOG ENTRY</span>
  </button>

  <!-- History -->
  <div class="mt-8">
    <div class="flex justify-between items-center mb-3 px-1">
      <div class="font-semibold">Log History</div>
      <button onclick="clearAllLogs()" class="text-xs text-red-400 hover:text-red-500">Clear all</button>
    </div>
    <div id="history" class="space-y-3"></div>
  </div>

  <script>
    // Tailwind script
    function initTailwind() {
      // already loaded via CDN
    }

    function updateCurrentDate() {
      const el = document.getElementById('current-date');
      const now = new Date();
      el.innerHTML = now.toLocaleDateString('en-US', { 
        weekday: 'short', month: 'short', day: 'numeric' 
      });
    }

    function saveLog() {
      const log = {
        id: Date.now(),
        timestamp: new Date().toISOString(),
        type: document.getElementById('type').value,
        dose: document.getElementById('dose').value || '—',
        unit: document.getElementById('unit').value,
        systolic: document.getElementById('systolic').value || '—',
        diastolic: document.getElementById('diastolic').value || '—',
        hr: document.getElementById('hr').value || '—',
        notes: document.getElementById('notes').value.trim()
      };

      let logs = JSON.parse(localStorage.getItem('usginger_logs') || '[]');
      logs.unshift(log); // newest first
      localStorage.setItem('usginger_logs', JSON.stringify(logs));

      // success feedback
      const btn = event.currentTarget;
      const originalText = event.target.innerHTML;
      event.target.innerHTML = `<i class="fa-solid fa-check"></i> SAVED!`;
      event.target.disabled = true;

      setTimeout(() => {
        event.target.innerHTML = originalText;
        event.target.disabled = false;
        loadHistory();
        // optional: clear form
        // document.querySelectorAll('input, textarea').forEach(el => el.value = '');
      }, 1200);
    }

    function loadHistory() {
      const container = document.getElementById('history');
      container.innerHTML = '';
      let logs = JSON.parse(localStorage.getItem('usginger_logs') || '[]');

      if (logs.length === 0) {
        container.innerHTML = `<div class="text-center text-gray-500 py-6 text-sm">No entries yet. First log = first win 🚀</div>`;
        return;
      }

      logs.forEach(log => {
        const date = new Date(log.timestamp);
        const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + 
                        ' • ' + date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

        const card = document.createElement('div');
        card.className = 'card rounded-2xl p-4 text-sm';
        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <div class="font-medium">${dateStr}</div>
              <div class="text-orange-400 text-xs mt-0.5">${log.type}</div>
            </div>
            <button onclick="deleteLog(${log.id}, this)" class="text-red-400 hover:text-red-500 text-xs px-2">✕</button>
          </div>
          
          <div class="mt-2 grid grid-cols-3 gap-2 text-xs">
            <div><span class="text-gray-400">Dose:</span> ${log.dose} ${log.unit}</div>
            <div><span class="text-gray-400">BP:</span> ${log.systolic}/${log.diastolic}</div>
            <div><span class="text-gray-400">HR:</span> ${log.hr} bpm</div>
          </div>
          
          ${log.notes ? `<div class="mt-2 text-xs text-gray-400 italic">"${log.notes}"</div>` : ''}
        `;
        container.appendChild(card);
      });
    }

    function deleteLog(id, element) {
      if (!confirm('Delete this entry?')) return;
      let logs = JSON.parse(localStorage.getItem('usginger_logs') || '[]');
      logs = logs.filter(l => l.id !== id);
      localStorage.setItem('usginger_logs', JSON.stringify(logs));
      element.closest('.card').remove();
      if (logs.length === 0) loadHistory();
    }

    function clearAllLogs() {
      if (!confirm('Delete ALL logs? This can’t be undone.')) return;
      localStorage.removeItem('usginger_logs');
      loadHistory();
    }

    // Init
    function init() {
      initTailwind();
      updateCurrentDate();
      loadHistory();

      // Keyboard support: Enter on last input saves
      const notes = document.getElementById('notes');
      notes.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && e.ctrlKey) {
          saveLog();
        }
      });
    }

    window.onload = init;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Easy Reader • Daily Log</title>
  <link rel="manifest" href="pwa-manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: #e5e5e5; }
    .card { background: #1a1a1a; }
    input, select, textarea { background: #111; border: 1px solid #333; }
    input:focus, select:focus, textarea:focus { border-color: #f97316; outline: none; }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #f97316; color: black; padding: 12px 24px; border-radius: 9999px;
      font-weight: 600; display: none; z-index: 9999;
    }
  </style>
</head>
<body class="max-w-md mx-auto p-4">

  <!-- Header -->
  <div class="mb-4">
    <div class="flex items-center gap-3 mb-1">
      <div class="w-9 h-9 bg-orange-500 rounded flex items-center justify-center">
        <i class="fa-solid fa-book text-white text-xl"></i>
      </div>
      <div class="font-bold text-xl">Stasis Reader</div>
    </div>

    <!-- Main Headline -->
    <div class="text-center">
      <h1 class="text-3xl font-bold tracking-tight">The Easy Reader ©</h1>
      <p class="text-sm text-gray-400 mt-0.5">Daily Log</p>
    </div>

    <!-- Install App Button -->
    <div class="text-center mt-3">
      <button id="installBtn" 
              class="hidden bg-orange-500 hover:bg-orange-600 text-black font-semibold px-5 py-2 rounded-2xl text-sm flex items-center gap-2 mx-auto">
        <i class="fa-solid fa-download"></i>
        <span>Install App</span>
      </button>
    </div>
  </div>

  <!-- Back button -->
  <div class="mb-5">
    <button onclick="window.location.href='index.html'" class="flex items-center gap-x-2 text-sm text-zinc-400 hover:text-white">
      <i class="fa-solid fa-arrow-left"></i>
      <span>Back to Overview</span>
    </button>
  </div>

  <!-- Daily Log Form + Rest of the page -->
  <!-- (Form, Stats, Chart, History, Download button stay the same as previous version) -->

  <div class="card rounded-2xl p-5 mb-6">
    <!-- ... your existing form code ... -->
  </div>

  <!-- Stats, Chart, History sections remain unchanged -->

  <script>
    // All your existing functions (saveLog, downloadData, etc.) stay here

    // PWA Install Button Logic
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt = null;
      installBtn.classList.add('hidden');
    });

    window.addEventListener('appinstalled', () => {
      installBtn.classList.add('hidden');
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }

    function init() {
      // loadAll();
    }
    window.onload = init;
  </script>
</body>
</html>
